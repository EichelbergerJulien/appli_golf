<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-jeu de Golf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">
        <header>
            <h1>Mini-jeu de Golf</h1>

            <nav>
                <ul>
                    <li><a href=".">Accueil</a></li>
                    <li><a href="galerie">Galerie</a></li>
                    <li><a href="contact">Contact</a></li>
                    <li><a href="reservations">Réservation(s)</a></li>
                    <li><a href="mini-jeu">Mini-jeu</a></li>
                </ul>
            </nav>

            <canvas id="golfGame" width="600" height="400"></canvas><br>
            <p>Cliquer sur le terrain pour tirer la balle vers la souris.</p>
            <p>Objectif : Mettre la balle dans le trou en un minimum de coups !</p>
            <div id="message"></div>
        </header>

        <script>

            window.addEventListener('load', () => {
                const canvas = document.getElementById('golfGame');
                const ctx = canvas.getContext('2d');
                const messageDiv = document.getElementById('message');

                // Balle et trou

                let balle = { x: 50, y: canvas.height / 2, radius: 10 };
                const trou = { x: canvas.width - 50, y: canvas.height / 2, radius: 15 };

                // Obstacles

                const obstacles = [
                    { type: 'tree', x: 200, y: canvas.height / 2 - 50, width: 20, height: 50 },
                    { type: 'water', x: 400, y: canvas.height / 2 - 25, width: 50, height: 50 }
                ];

                // État

                let isMoving = false;
                let velocity = { x: 0, y: 0 };
                const friction = 0.98;
                const maxSpeed = 6; // vitesse max

                // Afficher un message temporaire

                function showMessage(text) {
                    messageDiv.textContent = text;
                    setTimeout(() => { messageDiv.textContent = ''; }, 1500);
                }

                // Dessiner le terrain

                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Terrain vert

                    ctx.fillStyle = 'green';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Trou

                    ctx.beginPath();
                    ctx.arc(trou.x, trou.y, trou.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'black';
                    ctx.fill();

                    // Obstacles

                    obstacles.forEach(obs => {
                        ctx.fillStyle = obs.type === 'water' ? 'blue' : 'brown';
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    });

                    // Balle

                    ctx.beginPath();
                    ctx.arc(balle.x, balle.y, balle.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'white';
                    ctx.fill();
                }

                // Vérification de collision (trajectoire)

                function checkCollision(obs) {
                    const prevX = balle.x - velocity.x;
                    const prevY = balle.y - velocity.y;

                    if (Math.max(prevX, balle.x) + balle.radius < obs.x ||
                        Math.min(prevX, balle.x) - balle.radius > obs.x + obs.width ||
                        Math.max(prevY, balle.y) + balle.radius < obs.y ||
                        Math.min(prevY, balle.y) - balle.radius > obs.y + obs.height) {
                        return false;
                    }
                    return true;
                }

                // Déplacement de la balle

                function moveBalle() {
                    if (!isMoving) return;

                    // Déplacer la balle

                    balle.x += velocity.x;
                    balle.y += velocity.y;

                    // Léger effet aléatoire vertical

                    velocity.y += (Math.random() - 0.5) * 0.05;

                    // Friction
                    velocity.x *= friction;
                    velocity.y *= friction;

                    // Collision avec obstacles

                    for (let obs of obstacles) {
                        if (checkCollision(obs)) {
                            if (obs.type === 'water') {
                                showMessage('Plouf ! La balle est tombée dans l’eau 💧');
                                resetBalle();
                                return;
                            } else {
                                showMessage('Oups ! La balle a heurté un arbre 🌳');
                                velocity.x *= -0.5;
                                velocity.y *= -0.5;
                            }
                        }
                    }

                    // Vérifier le trou

                    const dx = balle.x - trou.x;
                    const dy = balle.y - trou.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < balle.radius + trou.radius) {
                        showMessage('Bravo ! La balle est dans le trou ⛳');
                        resetBalle();
                        return;
                    }

                    // Arrêt si trop lent

                    if (Math.abs(velocity.x) < 0.1 && Math.abs(velocity.y) < 0.1) {
                        isMoving = false;
                        velocity = { x: 0, y: 0 };
                        return;
                    }

                    draw();
                    requestAnimationFrame(moveBalle);
                }

                // Réinitialiser la balle

                function resetBalle() {
                    balle = { x: 50, y: canvas.height / 2, radius: 10 };
                    velocity = { x: 0, y: 0 };
                    isMoving = false;
                    draw();
                }

                // Tirer avec clic

                canvas.addEventListener('click', (e) => {
                    if (isMoving) return;

                    const rect = canvas.getBoundingClientRect();
                    const targetX = e.clientX - rect.left;
                    const targetY = e.clientY - rect.top;

                    // Calcul de la vitesse

                    velocity.x = (targetX - balle.x) * 0.05;
                    velocity.y = (targetY - balle.y) * 0.05;

                    // Limiter la vitesse max

                    const speed = Math.sqrt(velocity.x ** 2 + velocity.y ** 2);
                    if (speed > maxSpeed) {
                        velocity.x = (velocity.x / speed) * maxSpeed;
                        velocity.y = (velocity.y / speed) * maxSpeed;
                    }

                    isMoving = true;
                    moveBalle();
                });

                draw();
            });

        </script>
        <script src="app.js" defer></script>
    </div>
</body>

</html>
