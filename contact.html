<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Club de Golf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>Contactez-nous</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="galerie.html">Galerie</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="reservations.html">Réservation(s)</a></li>
                    <li><a href="mini_jeu.html">Mini-jeu</a></li>
                </ul>
            </nav>
        </header>

        <div class="image">
            <img src="images/img20.jpg" width="1160" height="200" alt="Description de l'image 20">
        </div>

        <section class="contact-form">

            <div id="popup_message" class="popup-message"></div>

            <h2> ✉️ Nous contacter</h2>

            <form id="contact_form" action="contact_traitement.php" method="POST">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Nom" required>

                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Prénom" required>

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="Email" required>

                <label for="tel">Télephone :</label>
                <input type="tel" id="tel" name="tel" placeholder="Téléphone" required>

                <label for="message">Message ou demande particulière:</label>
                <textarea class="form-control fixed-textarea" placeholder="Votre message..." id="contact_message" name="message"
                    required rows="5"></textarea>

                <button type="submit">Envoyer</button>
            </form>

        </section>

        <footer class="text-center mt-5">
            <p>&copy; 2026 Club de Golf de Chérisey</p>
        </footer>

    </div>

    <script src="app.js" defer></script>

</body>

</html>
