<!DOCTYPE html>

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2e7d32, #004d00, #3cc03c);
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card h1 {
            margin-bottom: 20px;
        }

        .card input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        .card input:focus {
            border-color: #0b640b;
        }

        .card button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #0b640b;
            color: white;
            font-size: 16px;
            cursor: pointer; 
        }

        .card button:hover {
            background: #27ae60;
        }

        #popup_message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
            color: white;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Connexion</h1> 

        <form id="login_form">
            <input type="email" id="login_email" placeholder="Email" required>
            <input type="password" id="login_password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>

        <div id="popup_message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script defer src="app.js"></script>

</body>

</html>
